name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift:
    name: swift
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - env:
          PROBO_CODESIGN_IDENTITY: "-"
        run: scripts/build.sh
